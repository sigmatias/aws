; ============================================================
; extensions.conf - Plan de discado PBX Startup en Crecimiento
; EP1 CUY5132 - Matias Oyanedel
; ============================================================

[general]
static=yes
writeprotect=no
clearglobalvars=no

[globals]
EMPRESA=Startup en Crecimiento

[default]
exten => _X.,1,Hangup()

; ============================================================
; Contexto interno: llamadas entre extensiones
; ============================================================
[internal]

; --- Llamadas directas entre extensiones ---
exten => 1001,1,NoOp(Llamada hacia 1001)
 same => n,Dial(PJSIP/1001,20)
 same => n,Hangup()

exten => 1002,1,NoOp(Llamada hacia 1002)
 same => n,Dial(PJSIP/1002,20)
 same => n,Hangup()

; --- Echo test (diagnostico de audio) ---
exten => 600,1,Answer()
 same => n,Playback(demo-echotest)
 same => n,Echo()
 same => n,Hangup()

; --- Mensaje de bienvenida (prueba de Playback) ---
exten => 100,1,NoOp(Mensaje de bienvenida)
 same => n,Answer()
 same => n,Wait(1)
 same => n,Playback(hello-world)
 same => n,Hangup()

; --- IVR con script AGI y consulta externa (rubrica IL 1.4) ---
exten => 200,1,NoOp(IVR AGI con consulta externa - CallerID: ${CALLERID(num)})
 same => n,Answer()
 same => n,Wait(1)
 same => n,AGI(consulta_externa.py,${CALLERID(num)})
 same => n,Hangup()
